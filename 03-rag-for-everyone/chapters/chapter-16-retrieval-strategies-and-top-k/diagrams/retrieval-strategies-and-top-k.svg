<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Retrieval Strategies and Top-K</title>
  <desc id="desc">A production retrieval pipeline from query through filters, rewrite, multi-query search, top-k candidates, dedupe, rerank, context assembly, trace, and eval loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f6fbff"/><stop offset="100%" stop-color="#f4fff1"/></linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eef8ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#123047" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#47728f"/></marker>
  </defs>
  <rect width="1180" height="520" rx="34" fill="url(#bg)"/>
  <text x="60" y="64" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17324d">Retrieval Strategy Pipeline</text>
  <text x="60" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#536676">Top-k is one lever inside a larger evidence-selection system.</text>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(55 145)"><rect width="145" height="100" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">Query</text><text x="22" y="70" font-size="13" fill="#536676">user intent</text></g>
    <g transform="translate(235 145)"><rect width="155" height="100" rx="20" fill="#fff8ec" stroke="#efc777"/><text x="22" y="40" font-size="16" font-weight="800" fill="#5d3b00">Filters</text><text x="22" y="70" font-size="13" fill="#6d5c3f">access, active</text></g>
    <g transform="translate(425 145)"><rect width="160" height="100" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">Rewrite</text><text x="22" y="70" font-size="13" fill="#536676">or multi-query</text></g>
    <g transform="translate(620 145)"><rect width="165" height="100" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">Search</text><text x="22" y="70" font-size="13" fill="#536676">similarity / sparse</text></g>
    <g transform="translate(820 145)"><rect width="150" height="100" rx="20" fill="#f1fff6" stroke="#9ad3ad"/><text x="22" y="40" font-size="16" font-weight="800" fill="#155c37">Top-K</text><text x="22" y="70" font-size="13" fill="#3f6b51">candidate set</text></g>
    <g transform="translate(1005 145)"><rect width="130" height="100" rx="20" fill="#17324d"/><text x="22" y="40" font-size="16" font-weight="800" fill="#ffffff">Dedupe</text><text x="22" y="70" font-size="13" fill="#dcecf8">reduce noise</text></g>
    <g transform="translate(300 335)"><rect width="170" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">Rerank</text><text x="22" y="68" font-size="13" fill="#536676">or expand context</text></g>
    <g transform="translate(535 335)"><rect width="185" height="95" rx="20" fill="#f1fff6" stroke="#9ad3ad"/><text x="22" y="40" font-size="16" font-weight="800" fill="#155c37">Context</text><text x="22" y="68" font-size="13" fill="#3f6b51">citations + budget</text></g>
    <g transform="translate(785 335)"><rect width="175" height="95" rx="20" fill="#fff8ec" stroke="#efc777"/><text x="22" y="40" font-size="16" font-weight="800" fill="#5d3b00">Trace</text><text x="22" y="68" font-size="13" fill="#6d5c3f">ranks + scores</text></g>
  </g>
  <g stroke="#47728f" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M203 195 H230"/><path d="M393 195 H420"/><path d="M588 195 H615"/><path d="M788 195 H815"/><path d="M973 195 H1000"/>
    <path d="M1070 248 C1000 330 600 310 475 365"/><path d="M473 382 H530"/><path d="M723 382 H780"/>
    <path d="M875 335 C800 285 380 282 310 248"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="55" y="330" width="175" height="100" rx="22" fill="#ffffff" stroke="#cfe3ef"/>
    <text x="78" y="362" font-size="15" font-weight="800" fill="#17324d">Tune With Evals</text>
    <text x="78" y="389" font-size="13" fill="#536676">Recall, noise,</text>
    <text x="78" y="408" font-size="13" fill="#536676">latency, citations.</text>
  </g>
</svg>
