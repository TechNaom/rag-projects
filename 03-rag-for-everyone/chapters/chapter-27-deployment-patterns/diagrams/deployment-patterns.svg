<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">Deployment Patterns Architecture</title>
  <desc id="desc">A release candidate moves through staging, a canary route, and a monitored ramp, then either promotes to full rollout or trips a rollback gate that restores the last good version.</desc>
  <rect width="980" height="440" rx="28" fill="#f8fbff"/>
  <rect x="42" y="54" width="896" height="332" rx="24" fill="#ffffff" stroke="#bdd7ee" stroke-width="2"/>
  <text x="490" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#18324a">Roll out gradually, watch closely, roll back fast</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#18324a">
    <rect x="72" y="126" width="145" height="76" rx="14" fill="#e8f4ff" stroke="#79acd8"/>
    <text x="145" y="157" text-anchor="middle" font-weight="700">Release</text><text x="145" y="180" text-anchor="middle">candidate</text>
    <rect x="270" y="126" width="145" height="76" rx="14" fill="#eefbf3" stroke="#7ac89c"/>
    <text x="343" y="157" text-anchor="middle" font-weight="700">Staging</text><text x="343" y="180" text-anchor="middle">deploy</text>
    <rect x="468" y="126" width="145" height="76" rx="14" fill="#fff7e8" stroke="#e5b76b"/>
    <text x="541" y="157" text-anchor="middle" font-weight="700">Canary</text><text x="541" y="180" text-anchor="middle">route</text>
    <rect x="666" y="126" width="145" height="76" rx="14" fill="#f1edff" stroke="#a998df"/>
    <text x="739" y="157" text-anchor="middle" font-weight="700">Monitored</text><text x="739" y="180" text-anchor="middle">ramp</text>
    <rect x="190" y="282" width="145" height="66" rx="14" fill="#eaf7f7" stroke="#72b8bc"/>
    <text x="263" y="310" text-anchor="middle" font-weight="700">Last good</text><text x="263" y="332" text-anchor="middle">version</text>
    <rect x="418" y="282" width="145" height="66" rx="14" fill="#ffeef4" stroke="#df8cab"/>
    <text x="491" y="310" text-anchor="middle" font-weight="700">Rollback</text><text x="491" y="332" text-anchor="middle">gate</text>
    <rect x="646" y="282" width="145" height="66" rx="14" fill="#eefbf3" stroke="#7ac89c"/>
    <text x="719" y="310" text-anchor="middle" font-weight="700">Full</text><text x="719" y="332" text-anchor="middle">rollout</text>
  </g>
  <g stroke="#4f7293" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M217 164h53"/><path d="M415 164h53"/><path d="M613 164h53"/>
    <path d="M729 202 C726 240 722 262 719 282"/>
    <path d="M666 180 C600 230 540 268 491 282"/>
    <path d="M418 315h-83"/>
  </g>
  <g stroke="#c17795" stroke-width="2.5" fill="none" stroke-dasharray="6 6" stroke-linecap="round">
    <path d="M240 282 C150 240 118 222 100 202"/>
  </g>
  <g fill="#4f7293"><path d="M266 156l12 8-12 8z"/><path d="M464 156l12 8-12 8z"/><path d="M662 156l12 8-12 8z"/><path d="M711 274l8 12 8-12z"/><path d="M497 274l8 10-11 6z"/><path d="M338 311l8-8 4 11z"/></g>
  <g fill="#c17795"><path d="M104 206l-10-9 13-2z"/></g>
  <text x="600" y="390" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#5c7085">Success path: candidate to staging to canary to ramp to full rollout. Regression path: ramp to rollback gate to last good version, then fix and rebuild the candidate.</text>
</svg>
