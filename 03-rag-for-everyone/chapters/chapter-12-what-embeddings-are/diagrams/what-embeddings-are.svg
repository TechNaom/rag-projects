<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">What Embeddings Are</title>
  <desc id="desc">Documents and user questions are converted into vectors, compared by similarity, and returned as top chunks for a grounded RAG answer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="100%" stop-color="#f1fff6"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#123047" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#47728f"/>
    </marker>
  </defs>
  <rect width="1180" height="520" rx="34" fill="url(#bg)"/>
  <text x="60" y="64" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17324d">Embeddings: A Map of Meaning</text>
  <text x="60" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#536676">Text becomes vectors. Similarity search finds likely evidence.</text>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 150)">
      <rect width="175" height="110" rx="20" fill="url(#node)" stroke="#b8d8ee"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#17324d">Chunks</text>
      <text x="24" y="72" font-size="13" fill="#536676">Policy, docs,</text>
      <text x="24" y="91" font-size="13" fill="#536676">tickets, code</text>
    </g>
    <g transform="translate(275 150)">
      <rect width="190" height="110" rx="20" fill="url(#node)" stroke="#b8d8ee"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#17324d">Embedding Model</text>
      <text x="24" y="72" font-size="13" fill="#536676">Converts text</text>
      <text x="24" y="91" font-size="13" fill="#536676">into numbers</text>
    </g>
    <g transform="translate(505 150)">
      <rect width="190" height="110" rx="20" fill="#fff8ec" stroke="#efc777"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#5d3b00">Vector Store</text>
      <text x="24" y="72" font-size="13" fill="#6d5c3f">Vectors + text</text>
      <text x="24" y="91" font-size="13" fill="#6d5c3f">+ metadata</text>
    </g>
    <g transform="translate(60 330)">
      <rect width="175" height="110" rx="20" fill="#f1fff6" stroke="#9ad3ad"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#155c37">Question</text>
      <text x="24" y="72" font-size="13" fill="#3f6b51">Embedded with</text>
      <text x="24" y="91" font-size="13" fill="#3f6b51">same model</text>
    </g>
    <g transform="translate(745 240)">
      <rect width="190" height="110" rx="20" fill="url(#node)" stroke="#b8d8ee"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#17324d">Similarity Search</text>
      <text x="24" y="72" font-size="13" fill="#536676">Cosine, dot,</text>
      <text x="24" y="91" font-size="13" fill="#536676">nearest neighbors</text>
    </g>
    <g transform="translate(970 240)">
      <rect width="150" height="110" rx="20" fill="#17324d"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#ffffff">Top Chunks</text>
      <text x="24" y="72" font-size="13" fill="#dcecf8">Candidate</text>
      <text x="24" y="91" font-size="13" fill="#dcecf8">evidence</text>
    </g>
  </g>
  <g stroke="#47728f" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M238 205 H270"/>
    <path d="M468 205 H500"/>
    <path d="M698 205 C735 205 720 295 740 295"/>
    <path d="M238 385 C420 385 600 330 740 305"/>
    <path d="M938 295 H965"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="305" y="345" width="365" height="72" rx="22" fill="#ffffff" stroke="#cfe3ef"/>
    <text x="332" y="374" font-size="15" font-weight="800" fill="#17324d">Production reminder</text>
    <text x="332" y="399" font-size="13" fill="#536676">Similarity finds candidates; metadata and evals decide trust.</text>
  </g>
</svg>
