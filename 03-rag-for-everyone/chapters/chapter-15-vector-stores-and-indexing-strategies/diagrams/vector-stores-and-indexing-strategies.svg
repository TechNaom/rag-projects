<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Vector Stores and Indexing Strategies</title>
  <desc id="desc">A production vector store flow from ingestion and staging index through eval gate, production index, filtered retrieval, context, citations, and rollback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f6fbff"/><stop offset="100%" stop-color="#f2fff6"/></linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eef8ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#123047" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#47728f"/></marker>
  </defs>
  <rect width="1180" height="520" rx="34" fill="url(#bg)"/>
  <text x="60" y="64" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17324d">Vector Store Release Architecture</text>
  <text x="60" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#536676">Store vectors with ids, metadata, filters, eval gates, release versions, and rollback paths.</text>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 145)"><rect width="160" height="105" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="42" font-size="16" font-weight="800" fill="#17324d">Chunks</text><text x="22" y="72" font-size="13" fill="#536676">text + metadata</text></g>
    <g transform="translate(255 145)"><rect width="160" height="105" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="42" font-size="16" font-weight="800" fill="#17324d">Embeddings</text><text x="22" y="72" font-size="13" fill="#536676">model + dimension</text></g>
    <g transform="translate(450 145)"><rect width="175" height="105" rx="20" fill="#fff8ec" stroke="#efc777"/><text x="22" y="42" font-size="16" font-weight="800" fill="#5d3b00">Staging Index</text><text x="22" y="72" font-size="13" fill="#6d5c3f">build and test</text></g>
    <g transform="translate(660 145)"><rect width="160" height="105" rx="20" fill="#f1fff6" stroke="#9ad3ad"/><text x="22" y="42" font-size="16" font-weight="800" fill="#155c37">Eval Gate</text><text x="22" y="72" font-size="13" fill="#3f6b51">golden queries</text></g>
    <g transform="translate(855 145)"><rect width="185" height="105" rx="20" fill="#17324d"/><text x="22" y="42" font-size="16" font-weight="800" fill="#ffffff">Production Index</text><text x="22" y="72" font-size="13" fill="#dcecf8">versioned traffic</text></g>
    <g transform="translate(255 335)"><rect width="160" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">Query</text><text x="22" y="68" font-size="13" fill="#536676">embedding</text></g>
    <g transform="translate(520 335)"><rect width="185" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">Filters + Search</text><text x="22" y="68" font-size="13" fill="#536676">tenant, access, active</text></g>
    <g transform="translate(780 335)"><rect width="185" height="95" rx="20" fill="#f1fff6" stroke="#9ad3ad"/><text x="22" y="40" font-size="16" font-weight="800" fill="#155c37">Context</text><text x="22" y="68" font-size="13" fill="#3f6b51">citations + trace</text></g>
  </g>
  <g stroke="#47728f" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M223 198 H250"/><path d="M418 198 H445"/><path d="M628 198 H655"/><path d="M823 198 H850"/>
    <path d="M418 382 H515"/><path d="M708 382 H775"/><path d="M945 250 C940 300 850 324 705 350"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="60" y="330" width="158" height="100" rx="22" fill="#ffffff" stroke="#cfe3ef"/>
    <text x="82" y="363" font-size="15" font-weight="800" fill="#17324d">Rollback</text>
    <text x="82" y="390" font-size="13" fill="#536676">Keep previous</text>
    <text x="82" y="409" font-size="13" fill="#536676">index online.</text>
  </g>
</svg>
