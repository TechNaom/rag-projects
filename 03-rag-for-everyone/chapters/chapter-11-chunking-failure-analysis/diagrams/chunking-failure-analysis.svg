<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Chunking Failure Analysis Loop</title>
  <desc id="desc">A production debugging loop from bad answer through trace inspection, failure label, controlled fix, evaluation gate, and release or rollback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6f2"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#16324a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1180" height="520" rx="34" fill="url(#bg)"/>
  <text x="60" y="64" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17324d">Chunking Failure Analysis Loop</text>
  <text x="60" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#536676">Debug the evidence path before tuning chunk size.</text>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 150)">
      <rect width="170" height="110" rx="20" fill="url(#node)" stroke="#b8d8ee"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#17324d">Bad Answer</text>
      <text x="24" y="72" font-size="13" fill="#536676">User sees wrong,</text>
      <text x="24" y="91" font-size="13" fill="#536676">missing, or stale info</text>
    </g>
    <g transform="translate(265 150)">
      <rect width="170" height="110" rx="20" fill="url(#node)" stroke="#b8d8ee"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#17324d">Trace</text>
      <text x="24" y="72" font-size="13" fill="#536676">Chunks, scores,</text>
      <text x="24" y="91" font-size="13" fill="#536676">filters, citations</text>
    </g>
    <g transform="translate(470 150)">
      <rect width="190" height="110" rx="20" fill="url(#node)" stroke="#b8d8ee"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#17324d">Gold Evidence</text>
      <text x="24" y="72" font-size="13" fill="#536676">Compare retrieved</text>
      <text x="24" y="91" font-size="13" fill="#536676">context to truth set</text>
    </g>
    <g transform="translate(695 150)">
      <rect width="185" height="110" rx="20" fill="#fff8ec" stroke="#efc777"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#5d3b00">Failure Label</text>
      <text x="24" y="72" font-size="13" fill="#6d5c3f">lost context, stale,</text>
      <text x="24" y="91" font-size="13" fill="#6d5c3f">overlap, boundary</text>
    </g>
    <g transform="translate(915 150)">
      <rect width="190" height="110" rx="20" fill="#f1fff6" stroke="#9ad3ad"/>
      <text x="24" y="42" font-size="17" font-weight="800" fill="#155c37">Controlled Fix</text>
      <text x="24" y="72" font-size="13" fill="#3f6b51">Change one lever</text>
      <text x="24" y="91" font-size="13" fill="#3f6b51">and rerun evals</text>
    </g>
  </g>
  <g stroke="#47728f" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M232 205 H260"/>
    <path d="M438 205 H465"/>
    <path d="M662 205 H690"/>
    <path d="M882 205 H910"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#47728f"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="185" y="330" width="810" height="92" rx="24" fill="#17324d"/>
    <text x="226" y="366" font-size="18" font-weight="800" fill="#ffffff">Release Gate</text>
    <text x="226" y="396" font-size="14" fill="#dcecf8">Golden queries must improve without regressions. If not, roll back the index or keep investigating.</text>
    <circle cx="880" cy="376" r="24" fill="#64d08a"/>
    <text x="873" y="383" font-size="22" font-weight="800" fill="#17324d">✓</text>
  </g>
</svg>
