<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">Context Injection Architecture</title>
  <desc id="desc">Flow from user question through retrieved chunks, policy filter, ordering, compression, prompt boundary builder, model answer, citations, and trace logs.</desc>
  <rect width="980" height="440" rx="28" fill="#f7fbff"/>
  <rect x="40" y="52" width="900" height="336" rx="24" fill="#ffffff" stroke="#bdd7ee" stroke-width="2"/>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#18324a">
    <g>
      <rect x="70" y="120" width="120" height="72" rx="14" fill="#e8f4ff" stroke="#79acd8"/>
      <text x="130" y="150" text-anchor="middle" font-weight="700">User</text><text x="130" y="172" text-anchor="middle">question</text>
    </g>
    <g>
      <rect x="230" y="92" width="130" height="128" rx="14" fill="#eefbf3" stroke="#7ac89c"/>
      <text x="295" y="124" text-anchor="middle" font-weight="700">Retrieved</text><text x="295" y="146" text-anchor="middle">chunks</text><text x="295" y="177" text-anchor="middle">scores</text><text x="295" y="199" text-anchor="middle">metadata</text>
    </g>
    <g>
      <rect x="400" y="92" width="130" height="128" rx="14" fill="#fff7e8" stroke="#e5b76b"/>
      <text x="465" y="123" text-anchor="middle" font-weight="700">Policy</text><text x="465" y="145" text-anchor="middle">filter</text><text x="465" y="177" text-anchor="middle">access</text><text x="465" y="199" text-anchor="middle">freshness</text>
    </g>
    <g>
      <rect x="570" y="92" width="130" height="128" rx="14" fill="#f1edff" stroke="#a998df"/>
      <text x="635" y="123" text-anchor="middle" font-weight="700">Context</text><text x="635" y="145" text-anchor="middle">packer</text><text x="635" y="177" text-anchor="middle">order</text><text x="635" y="199" text-anchor="middle">budget</text>
    </g>
    <g>
      <rect x="740" y="92" width="130" height="128" rx="14" fill="#ffeef4" stroke="#df8cab"/>
      <text x="805" y="123" text-anchor="middle" font-weight="700">Prompt</text><text x="805" y="145" text-anchor="middle">boundary</text><text x="805" y="177" text-anchor="middle">evidence as</text><text x="805" y="199" text-anchor="middle">data</text>
    </g>
