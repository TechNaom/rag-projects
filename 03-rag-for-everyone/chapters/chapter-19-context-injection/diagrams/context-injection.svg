    </g>
    <g>
      <rect x="740" y="276" width="130" height="68" rx="14" fill="#eefbf3" stroke="#7ac89c"/>
      <text x="805" y="306" text-anchor="middle" font-weight="700">Answer</text><text x="805" y="328" text-anchor="middle">with citations</text>
    </g>
  </g>
  <g stroke="#4f7293" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M190 156h40"/><path d="M360 156h40"/><path d="M530 156h40"/><path d="M700 156h40"/>
