<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">RAG execution pipeline</title>
  <desc id="desc">Offline indexing pipeline connects to online query pipeline, with trace feedback improving future index releases.</desc>
  <rect width="1100" height="520" rx="24" fill="#f6f7fb"/>
  <rect x="40" y="60" width="1020" height="160" rx="18" fill="#eaf1fc" stroke="#2e6bb8" stroke-opacity=".25"/>
  <rect x="40" y="285" width="1020" height="170" rx="18" fill="#fff8e6" stroke="#e6a800" stroke-opacity=".32"/>
  <text x="60" y="95" font-family="Inter, Arial" font-size="22" font-weight="700" fill="#101b33">Offline indexing pipeline</text>
  <text x="60" y="320" font-family="Inter, Arial" font-size="22" font-weight="700" fill="#101b33">Online query pipeline</text>
  <g font-family="Inter, Arial" font-size="14" font-weight="700" fill="#101b33">
    <g>
      <rect x="70" y="125" width="120" height="54" rx="12" fill="#fff"/>
      <text x="96" y="157">Sources</text>
      <rect x="215" y="125" width="120" height="54" rx="12" fill="#fff"/>
      <text x="251" y="157">Parse</text>
      <rect x="360" y="125" width="120" height="54" rx="12" fill="#fff"/>
      <text x="396" y="157">Chunk</text>
      <rect x="505" y="125" width="130" height="54" rx="12" fill="#fff"/>
      <text x="532" y="157">Metadata</text>
      <rect x="660" y="125" width="120" height="54" rx="12" fill="#fff"/>
      <text x="685" y="157">Index</text>
      <rect x="805" y="125" width="120" height="54" rx="12" fill="#fff"/>
      <text x="836" y="157">Validate</text>
      <rect x="950" y="125" width="80" height="54" rx="12" fill="#101b33"/>
      <text x="967" y="157" fill="#ffc93c">Publish</text>
    </g>
    <g>
      <rect x="70" y="350" width="120" height="54" rx="12" fill="#fff"/>
      <text x="98" y="382">Question</text>
      <rect x="215" y="350" width="120" height="54" rx="12" fill="#fff"/>
      <text x="251" y="382">Route</text>
      <rect x="360" y="350" width="120" height="54" rx="12" fill="#fff"/>
      <text x="382" y="382">Permissions</text>
      <rect x="505" y="350" width="120" height="54" rx="12" fill="#fff"/>
      <text x="534" y="382">Retrieve</text>
      <rect x="650" y="350" width="120" height="54" rx="12" fill="#fff"/>
      <text x="682" y="382">Rerank</text>
      <rect x="795" y="350" width="120" height="54" rx="12" fill="#fff"/>
      <text x="824" y="382">Context</text>
      <rect x="940" y="350" width="90" height="54" rx="12" fill="#101b33"/>
      <text x="958" y="382" fill="#ffc93c">Answer</text>
    </g>
  </g>
  <g stroke="#2e6bb8" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M190 152h25M335 152h25M480 152h25M635 152h25M780 152h25M925 152h25"/>
    <path d="M190 377h25M335 377h25M480 377h25M625 377h25M770 377h25M915 377h25"/>
    <path d="M990 180c0 70-425 90-425 170"/>
  </g>
  <path d="M985 404c-40 52-278 82-460 50-136-24-254-6-365 36" fill="none" stroke="#e6a800" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="700" y="485" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#4b5160">Trace + eval feedback improves the next pipeline release</text>
</svg>
