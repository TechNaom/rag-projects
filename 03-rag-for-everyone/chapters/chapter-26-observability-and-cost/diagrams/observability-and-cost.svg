<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">Observability and Cost Architecture</title>
  <desc id="desc">A question with trace id, route, and tenant flows into stage capture, then a cost calculator, then fans out into dashboards, a budget and alert gate, and cost review that feeds optimization actions.</desc>
  <rect width="980" height="440" rx="28" fill="#f8fbff"/>
  <rect x="42" y="54" width="896" height="332" rx="24" fill="#ffffff" stroke="#bdd7ee" stroke-width="2"/>
  <text x="490" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#18324a">Every query is traced, priced, and reviewed</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#18324a">
    <rect x="72" y="126" width="145" height="76" rx="14" fill="#e8f4ff" stroke="#79acd8"/>
    <text x="145" y="150" text-anchor="middle" font-weight="700">Question</text><text x="145" y="171" text-anchor="middle">+ trace id</text><text x="145" y="190" text-anchor="middle">route + tenant</text>
    <rect x="270" y="126" width="145" height="76" rx="14" fill="#eefbf3" stroke="#7ac89c"/>
    <text x="343" y="150" text-anchor="middle" font-weight="700">Stage capture</text><text x="343" y="171" text-anchor="middle">latency + tokens</text><text x="343" y="190" text-anchor="middle">per stage</text>
    <rect x="468" y="126" width="145" height="76" rx="14" fill="#fff7e8" stroke="#e5b76b"/>
    <text x="541" y="157" text-anchor="middle" font-weight="700">Cost</text><text x="541" y="180" text-anchor="middle">calculator</text>
    <rect x="666" y="126" width="145" height="76" rx="14" fill="#f1edff" stroke="#a998df"/>
    <text x="739" y="157" text-anchor="middle" font-weight="700">Dashboards</text><text x="739" y="180" text-anchor="middle">route/tenant slices</text>
    <rect x="190" y="282" width="145" height="66" rx="14" fill="#ffeef4" stroke="#df8cab"/>
    <text x="263" y="310" text-anchor="middle" font-weight="700">Alert /</text><text x="263" y="332" text-anchor="middle">budget gate</text>
    <rect x="418" y="282" width="145" height="66" rx="14" fill="#eaf7f7" stroke="#72b8bc"/>
    <text x="491" y="310" text-anchor="middle" font-weight="700">Cost review</text><text x="491" y="332" text-anchor="middle">by tenant/route</text>
    <rect x="646" y="282" width="145" height="66" rx="14" fill="#eefbf3" stroke="#7ac89c"/>
    <text x="719" y="310" text-anchor="middle" font-weight="700">Optimization</text><text x="719" y="332" text-anchor="middle">cache/route/compress</text>
  </g>
  <g stroke="#4f7293" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M217 164h53"/><path d="M415 164h53"/><path d="M613 164h53"/>
    <path d="M739 202 C680 252 590 282 563 302"/>
    <path d="M739 202 C700 250 710 260 719 282"/>
    <path d="M541 202 C480 245 400 280 335 304"/>
    <path d="M145 202 C220 245 350 280 418 304"/>
  </g>
  <g fill="#4f7293"><path d="M266 156l12 8-12 8z"/><path d="M464 156l12 8-12 8z"/><path d="M662 156l12 8-12 8z"/><path d="M560 295l12 8-12 8z"/><path d="M711 276l8 12 8-12z"/><path d="M331 296l12 8-12 8z"/><path d="M414 296l12 8-12 8z"/></g>
</svg>
