<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Neural Embedding Selection and Release</title>
  <desc id="desc">A neural embedding release process from model candidates through evaluation, vector index build, query embedding, retrieval, shadow testing, and release or rollback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#f3fff3"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#123047" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#47728f"/>
    </marker>
  </defs>
  <rect width="1180" height="520" rx="34" fill="url(#bg)"/>
  <text x="60" y="64" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17324d">Neural Embeddings: Select, Evaluate, Release</text>
  <text x="60" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#536676">Modern embedding power needs production gates: evals, privacy, cost, re-indexing, and rollback.</text>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 145)"><rect width="165" height="105" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="42" font-size="16" font-weight="800" fill="#17324d">Candidates</text><text x="22" y="72" font-size="13" fill="#536676">local, managed,</text><text x="22" y="91" font-size="13" fill="#536676">domain, hybrid</text></g>
    <g transform="translate(260 145)"><rect width="170" height="105" rx="20" fill="#fff8ec" stroke="#efc777"/><text x="22" y="42" font-size="16" font-weight="800" fill="#5d3b00">Golden Evals</text><text x="22" y="72" font-size="13" fill="#6d5c3f">Recall, MRR,</text><text x="22" y="91" font-size="13" fill="#6d5c3f">citation support</text></g>
    <g transform="translate(465 145)"><rect width="180" height="105" rx="20" fill="#f1fff6" stroke="#9ad3ad"/><text x="22" y="42" font-size="16" font-weight="800" fill="#155c37">Chosen Model</text><text x="22" y="72" font-size="13" fill="#3f6b51">dimension +</text><text x="22" y="91" font-size="13" fill="#3f6b51">provider controls</text></g>
    <g transform="translate(680 145)"><rect width="175" height="105" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="42" font-size="16" font-weight="800" fill="#17324d">New Index</text><text x="22" y="72" font-size="13" fill="#536676">re-embedded</text><text x="22" y="91" font-size="13" fill="#536676">corpus version</text></g>
    <g transform="translate(900 145)"><rect width="200" height="105" rx="20" fill="#17324d"/><text x="22" y="42" font-size="16" font-weight="800" fill="#ffffff">Release Gate</text><text x="22" y="72" font-size="13" fill="#dcecf8">shadow test,</text><text x="22" y="91" font-size="13" fill="#dcecf8">monitor, rollback</text></g>
    <g transform="translate(260 335)"><rect width="170" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">User Query</text><text x="22" y="68" font-size="13" fill="#536676">same model</text></g>
    <g transform="translate(525 335)"><rect width="180" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="22" y="40" font-size="16" font-weight="800" fill="#17324d">Query Vector</text><text x="22" y="68" font-size="13" fill="#536676">compatible space</text></g>
    <g transform="translate(760 335)"><rect width="190" height="95" rx="20" fill="#f1fff6" stroke="#9ad3ad"/><text x="22" y="40" font-size="16" font-weight="800" fill="#155c37">Dense / Hybrid</text><text x="22" y="68" font-size="13" fill="#3f6b51">retrieve evidence</text></g>
  </g>
  <g stroke="#47728f" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M228 198 H255"/>
    <path d="M433 198 H460"/>
    <path d="M648 198 H675"/>
    <path d="M858 198 H895"/>
    <path d="M433 382 H520"/>
    <path d="M708 382 H755"/>
    <path d="M858 250 C858 290 850 318 848 332"/>
    <path d="M955 335 C1000 305 1010 285 1002 255"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="60" y="328" width="160" height="108" rx="22" fill="#ffffff" stroke="#cfe3ef"/>
    <text x="83" y="363" font-size="15" font-weight="800" fill="#17324d">Rule</text>
    <text x="83" y="390" font-size="13" fill="#536676">New model means</text>
    <text x="83" y="409" font-size="13" fill="#536676">new index release.</text>
  </g>
</svg>
