<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Reranking and Retrieval Optimization</title>
  <desc id="desc">Reranking pipeline showing query, first-stage retrieval, candidate pool, reranker, dedupe, final context, citations, and eval loop.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f6fbff"/><stop offset="100%" stop-color="#f4fff1"/></linearGradient><linearGradient id="node" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eef8ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#123047" flood-opacity="0.14"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#47728f"/></marker></defs>
  <rect width="1180" height="520" rx="34" fill="url(#bg)"/>
  <text x="60" y="64" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17324d">Retrieve Many, Return Few</text>
  <text x="60" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#536676">Reranking improves ordering after retrieval has found a candidate pool.</text>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 170)"><rect width="130" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="24" y="40" font-size="16" font-weight="800" fill="#17324d">Query</text><text x="24" y="68" font-size="13" fill="#536676">user need</text></g>
    <g transform="translate(235 170)"><rect width="180" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="24" y="40" font-size="16" font-weight="800" fill="#17324d">First Retrieval</text><text x="24" y="68" font-size="13" fill="#536676">fast recall</text></g>
    <g transform="translate(460 170)"><rect width="165" height="95" rx="20" fill="#fff8ec" stroke="#efc777"/><text x="24" y="40" font-size="16" font-weight="800" fill="#5d3b00">Candidates</text><text x="24" y="68" font-size="13" fill="#6d5c3f">top 30-100</text></g>
    <g transform="translate(670 170)"><rect width="150" height="95" rx="20" fill="#f1fff6" stroke="#9ad3ad"/><text x="24" y="40" font-size="16" font-weight="800" fill="#155c37">Reranker</text><text x="24" y="68" font-size="13" fill="#3f6b51">careful score</text></g>
    <g transform="translate(865 170)"><rect width="145" height="95" rx="20" fill="url(#node)" stroke="#b8d8ee"/><text x="24" y="40" font-size="16" font-weight="800" fill="#17324d">Dedupe</text><text x="24" y="68" font-size="13" fill="#536676">diversify</text></g>
    <g transform="translate(640 350)"><rect width="170" height="90" rx="20" fill="#17324d"/><text x="24" y="38" font-size="16" font-weight="800" fill="#ffffff">Final Context</text><text x="24" y="64" font-size="13" fill="#dcecf8">top evidence</text></g>
    <g transform="translate(865 350)"><rect width="170" height="90" rx="20" fill="#fff8ec" stroke="#efc777"/><text x="24" y="38" font-size="16" font-weight="800" fill="#5d3b00">Eval Loop</text><text x="24" y="64" font-size="13" fill="#6d5c3f">quality + latency</text></g>
  </g>
  <g stroke="#47728f" stroke-width="3" fill="none" marker-end="url(#arrow)"><path d="M193 218 H230"/><path d="M418 218 H455"/><path d="M628 218 H665"/><path d="M823 218 H860"/><path d="M938 268 C900 320 820 350 812 388"/><path d="M812 395 H860"/><path d="M865 395 C640 470 305 360 325 268"/></g>
  <g font-family="Inter, Arial, sans-serif"><rect x="60" y="345" width="220" height="90" rx="22" fill="#ffffff" stroke="#cfe3ef"/><text x="84" y="377" font-size="15" font-weight="800" fill="#17324d">Rule</text><text x="84" y="403" font-size="13" fill="#536676">Reranking helps only if</text><text x="84" y="422" font-size="13" fill="#536676">gold is in candidates.</text></g>
</svg>
