<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">RAG Query Lifecycle</title>
  <desc id="desc">A diagram showing the RAG lifecycle from user question through retrieval, context, grounded prompt, answer, citations, logs, evals, and improvement loop.</desc>
  <rect width="1120" height="560" rx="28" fill="#f4f8fa"/>
  <rect x="32" y="32" width="1056" height="496" rx="24" fill="#ffffff" opacity="0.78" stroke="#b9dfe4"/>
  <text x="64" y="82" font-family="Inter, Arial" font-size="28" font-weight="800" fill="#101b33">RAG Query Lifecycle</text>
  <text x="64" y="112" font-family="Inter, Arial" font-size="15" fill="#536a70">Each stage can be logged, evaluated, and improved.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0e7c86"/>
    </marker>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f7f9"/>
    </linearGradient>
  </defs>
  <g font-family="Inter, Arial" font-size="14" fill="#172326">
    <g transform="translate(64 165)">
      <rect width="170" height="76" rx="14" fill="url(#card)" stroke="#13a7b5"/>
      <text x="18" y="32" font-weight="800">1. User Question</text>
      <text x="18" y="55" fill="#536a70">Raw request</text>
    </g>
    <g transform="translate(284 165)">
      <rect width="170" height="76" rx="14" fill="url(#card)" stroke="#13a7b5"/>
      <text x="18" y="32" font-weight="800">2. Understand</text>
      <text x="18" y="55" fill="#536a70">Intent + missing data</text>
    </g>
    <g transform="translate(504 165)">
      <rect width="170" height="76" rx="14" fill="url(#card)" stroke="#13a7b5"/>
      <text x="18" y="32" font-weight="800">3. Retrieve</text>
      <text x="18" y="55" fill="#536a70">Query + filters</text>
    </g>
    <g transform="translate(724 165)">
      <rect width="170" height="76" rx="14" fill="url(#card)" stroke="#13a7b5"/>
      <text x="18" y="32" font-weight="800">4. Rerank</text>
      <text x="18" y="55" fill="#536a70">Best evidence first</text>
    </g>
    <g transform="translate(284 330)">
      <rect width="170" height="76" rx="14" fill="url(#card)" stroke="#ffc93c"/>
      <text x="18" y="32" font-weight="800">5. Context</text>
      <text x="18" y="55" fill="#536a70">Assemble evidence</text>
    </g>
    <g transform="translate(504 330)">
      <rect width="170" height="76" rx="14" fill="url(#card)" stroke="#ffc93c"/>
      <text x="18" y="32" font-weight="800">6. Prompt</text>
      <text x="18" y="55" fill="#536a70">Grounded rules</text>
    </g>
    <g transform="translate(724 330)">
      <rect width="170" height="76" rx="14" fill="url(#card)" stroke="#ffc93c"/>
      <text x="18" y="32" font-weight="800">7. Answer</text>
      <text x="18" y="55" fill="#536a70">Cite, refuse, escalate</text>
    </g>
    <g transform="translate(914 250)">
      <rect width="130" height="92" rx="14" fill="#101b33" opacity="0.94"/>
      <text x="18" y="34" font-weight="800" fill="#ffc93c">Trace</text>
      <text x="18" y="58" fill="#e4e9f5">Logs + evals</text>
      <text x="18" y="78" fill="#e4e9f5">Improve loop</text>
    </g>
  </g>
  <g stroke="#0e7c86" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M234 203 H276"/>
    <path d="M454 203 H496"/>
    <path d="M674 203 H716"/>
    <path d="M809 241 C809 285 736 300 674 340"/>
    <path d="M454 368 H496"/>
    <path d="M674 368 H716"/>
    <path d="M894 368 C920 360 926 340 914 320"/>
    <path d="M914 286 C760 112 430 118 150 165"/>
  </g>
</svg>
