<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{CHAPTER_TITLE}} Quiz — RAG for Everyone</title>
<meta name="description" content="Interactive quiz for {{CHAPTER_TITLE}}.">
<link rel="stylesheet" href="../../assets/style.css">
</head>
<body data-active-chapter="{{CHAPTER_ID}}" data-chapter-id="{{CHAPTER_ID}}">
<button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle chapter list" aria-expanded="false">Chapters</button>
<aside id="chapter-sidebar" class="sidebar" data-root="../../" aria-label="Chapter navigation"></aside>
<div class="sidebar-scrim" id="sidebar-scrim"></div>

<header class="top-bar">
  <div class="page">
    <a href="../../index.html" class="brand">RAG for Everyone</a>
    <nav>
      <a href="../../index.html">All Chapters</a>
      <a href="../../docs/curriculum/index.html">Roadmap</a>
    </nav>
  </div>
</header>

<main class="page">
  <p><a href="lesson.html">&larr; Back to the lesson</a></p>

  <span class="chapter-badge">Chapter {{CHAPTER_NUMBER}} Quiz</span>
  <h1>{{CHAPTER_TITLE}}</h1>
  <p>{{QUIZ_INTRO}}</p>

  <div class="quiz-progress-wrap" aria-hidden="true">
    <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
  </div>

  <form onsubmit="return false;">
    <div class="quiz-question">
      <label for="q1"><span class="q-num">1</span> {{QUESTION_1_TEXT}}</label>
      <div class="fib-row">
        <input type="text" id="q1" class="fib-blank" data-answers="{{QUESTION_1_ANSWERS}}" aria-label="Answer for question 1">
        <button type="button" class="check-btn">Check</button>
        <span class="fib-feedback" aria-live="polite"></span>
      </div>
    </div>

    <div id="check-all-wrap">
      <button type="button" id="check-all-btn" class="check-btn">Check All Answers</button>
      <span id="quiz-score"></span>
    </div>

    <div class="quiz-celebration" id="quiz-celebration" aria-live="polite">
      Perfect score. Chapter complete.
    </div>
  </form>

  <div class="chapter-nav">
    <a href="lesson.html">&larr; Back to Lesson</a>
    <a href="exercises/index.html">Exercises &rarr;</a>
  </div>
</main>

<footer class="site-footer">
  <div class="page">
    <span>RAG for Everyone — free, visual, engineering-first GenAI learning.</span>
  </div>
</footer>

<script src="../../assets/quiz-engine.js"></script>
<script src="../../assets/progress.js"></script>
<script src="../../assets/chapters-data.js"></script>
<script src="../../assets/sidebar.js"></script>
</body>
</html>
