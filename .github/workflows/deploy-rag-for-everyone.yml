name: Deploy RAG for Everyone

on:
  push:
    branches:
      - main
    paths:
      - "03-rag-for-everyone/**"
      - ".github/workflows/deploy-rag-for-everyone.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: rag-for-everyone-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 03-rag-for-everyone

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
