name: Deploy RAG for Everyone

on:
  push:
    branches:
      - main
    paths:
      - "03-rag-for-everyone/**"
      - ".github/workflows/deploy-rag-for-everyone.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: rag-for-everyone-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare Pages artifact
        run: |
          rm -rf pages-artifact
          mkdir -p pages-artifact
          cp -R 03-rag-for-everyone/. pages-artifact/
          rm -rf pages-artifact/rag-for-everyone
          mkdir -p pages-artifact/rag-for-everyone
          cp -R 03-rag-for-everyone/. pages-artifact/rag-for-everyone/
          rm -rf pages-artifact/rag-for-everyone/rag-for-everyone

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
