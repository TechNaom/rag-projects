[api]
# Copy this file to config.ini and fill in your values.
groq_api_key = YOUR_GROQ_API_KEY_HERE
groq_model = llama-3.3-70b-versatile
groq_api_base = https://api.groq.com/openai/v1/chat/completions
groq_max_tokens = 1024

[provider]
# Default generation provider. Options: ollama | groq | extractive
# If ollama/groq is chosen but unreachable, the offline extractive answerer is
# used automatically so the audit pipeline still runs end-to-end.
default = ollama
ollama_timeout = 180
